<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IBC Auditions 2026 | Global Music Championship</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    min-height: 100vh;
    font-family: 'Poppins', sans-serif;
    overflow-x: hidden;
}

/* BACKGROUND VIDEO */
#bg-video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -2;
}
.overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.45);
    z-index: -1;
}

/* MUSICAL STICKERS */
.music-icons i {
    position: fixed;
    font-size: 46px;
    color: rgba(255,255,255,0.4);
    animation: float 6s infinite ease-in-out;
    z-index: 1;
}
.music-icons i:nth-child(1) { top: 8%; left: 5%; }
.music-icons i:nth-child(2) { top: 18%; left: 90%; }
.music-icons i:nth-child(3) { top: 45%; left: 3%; }
.music-icons i:nth-child(4) { top: 70%; left: 95%; }
.music-icons i:nth-child(5) { top: 85%; left: 15%; }
.music-icons i:nth-child(6) { top: 12%; left: 50%; }
.music-icons i:nth-child(7) { top: 75%; left: 55%; }
.music-icons i:nth-child(8) { top: 35%; left: 75%; }
.music-icons i:nth-child(9) { top: 88%; left: 80%; }
.music-icons i:nth-child(10){ top: 50%; left: 90%; }

@keyframes float {
    0% { transform: translateY(0); }
    50% { transform: translateY(-25px); }
    100% { transform: translateY(0); }
}

/* FORM CONTAINER */
.container {
    max-width: 760px;
    width: 100%;
    margin: 40px auto;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(6px);
    border-radius: 30px;
    padding: 45px;
    box-shadow: 0 0 40px rgba(255,180,0,0.4);
    color: white;
    z-index: 5;
}
h1 {
    text-align: center;
    font-family: 'Orbitron', sans-serif;
    font-size: 38px;
    background: linear-gradient(90deg, #ff00cc, #ffcc00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}
.subtitle {
    text-align: center;
    font-size: 14px;
    margin: 10px 0 30px;
    color: #fff;
    letter-spacing: 1px;
}
.form-group { margin-bottom: 18px; }
label {
    font-size: 13px;
    color: #ffeb99;
}
input, textarea, select {
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    border: none;
    margin-top: 6px;
    background: rgba(255,255,255,0.25);
    color: #000;
    font-weight: 500;
}
textarea { resize: none; height: 90px; }
.row { display: flex; gap: 15px; }
.row .form-group { flex: 1; }
button {
    width: 100%;
    padding: 18px;
    border-radius: 40px;
    border: none;
    background: linear-gradient(135deg, #ff0080, #ffcc00);
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 10px;
}
button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 30px #ffcc00;
}
.footer {
    text-align: center;
    margin-top: 20px;
    font-size: 12px;
    color: #fff;
}
@media (max-width: 650px) {
    .row { flex-direction: column; }
    h1 { font-size: 30px; }
}
</style>
</head>
<body>

<!-- BACKGROUND VIDEO -->
<video id="bg-video" autoplay muted loop playsinline>
    <source src="file:///C:/Users/SIT.LAB8/Downloads/Bandish Bandits S2_ Sakhi Mori (Full Video) _ Ritwik Bhowmik, Sheeba Chaddha, Rajesh Tailang _ DigV.mp4" type="video/mp4">
    Your browser does not support the video tag.
</video>
<div class="overlay"></div>

<!-- MUSIC ICONS -->
<div class="music-icons">
    <i class="fa-solid fa-guitar"></i>
    <i class="fa-solid fa-drum"></i>
    <i class="fa-solid fa-microphone"></i>
    <i class="fa-solid fa-music"></i>
    <i class="fa-solid fa-headphones"></i>
    <i class="fa-solid fa-record-vinyl"></i>
    <i class="fa-solid fa-radio"></i>
    <i class="fa-solid fa-compact-disc"></i>
    <i class="fa-solid fa-sliders"></i>
    <i class="fa-solid fa-volume-high"></i>
</div>

<!-- FORM -->
<div class="container">
  <h1>INDIA'S BAND CHAMPIONSHIP</h1>
  <div class="subtitle">World-Class College Band Championship • Global Stage</div>
  <form>
    <div class="form-group">
        <label>Band Name</label>
        <input type="text" required>
    </div>
    <div class="row">
        <div class="form-group">
            <label>College / University</label>
            <input type="text" required>
        </div>
        <div class="form-group">
            <label>City</label>
            <input type="text" required>
        </div>
    </div>
    <div class="row">
        <div class="form-group">
            <label>Number of Band Members</label>
            <input type="number" required>
        </div>
        <div class="form-group">
            <label>Primary Genre</label>
            <select required>
                <option value="">Select Genre</option>
                <option>Indian Classical Fusion</option>
                <option>Rock</option>
                <option>Indie</option>
                <option>Jazz</option>
                <option>Folk</option>
            </select>
        </div>
    </div>
    <div class="form-group">
        <label>Instruments Used</label>
        <input type="text" required>
    </div>
    <div class="row">
        <div class="form-group">
            <label>Performance Duration (minutes)</label>
            <input type="number" required>
        </div>
        <div class="form-group">
            <label>Preferred Audition City</label>
            <select required>
                <option>Mumbai</option>
                <option>Delhi</option>
                <option>Bangalore</option>
                <option>Pune</option>
                <option>Kolkata</option>
            </select>
        </div>
    </div>
    <div class="form-group">
        <label>Performance Video / Demo Link</label>
        <input type="url" required>
    </div>
    <div class="row">
        <div class="form-group">
            <label>Email</label>
            <input type="email" required>
        </div>
        <div class="form-group">
            <label>Contact Number</label>
            <input type="tel" required>
        </div>
    </div>
    <div class="form-group">
        <label>About the Band</label>
        <textarea></textarea>
    </div>
    <button type="submit">🔥 Submit Audition Entry</button>
  </form>
  <div class="footer">Where Tradition Meets the World Stage • 🇮🇳 IBC</div>
</div>

</body>
</html>
